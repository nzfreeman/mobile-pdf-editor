name: mobile_pdf_editor
description: Multi-page Flutter PDF editor with drawing, images, stamps, undo/redo and PDF utilities.
publish_to: 'none'
version: 0.4.3+9

environment:
  sdk: '>=3.12.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  image_picker: ^1.2.3
  image_cropper: ^12.2.1
  image: ^4.9.1
  http: ^1.6.0
  in_app_update: ^5.0.0
  package_info_plus: ^9.0.0
  pdfrx: ^2.4.7
  pdf: ^3.13.0
  printing: ^5.15.0
  path_provider: ^2.1.5
  shared_preferences: ^2.5.5
  share_plus: ^12.0.2
  signature: ^6.3.0
  url_launcher: ^6.3.2
  uuid: ^4.5.2
  google_sign_in: ^7.2.0
  googleapis: ^16.0.0
  extension_google_sign_in_as_googleapis_auth: ^3.0.0

flutter:
  uses-material-design: true
