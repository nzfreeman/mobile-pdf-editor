name: Apply KGP plugin upgrades

on:
  push:
    paths:
      - '.github/workflows/apply-kgp-plugin-upgrades.yml'

permissions:
  contents: write

jobs:
  upgrade:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Migrate FilePicker 11 API
        run: |
          python3 - <<'PY'
          from pathlib import Path

          changed = []
          for path in Path('lib').rglob('*.dart'):
              source = path.read_text()
              updated = source.replace('FilePicker.platform.', 'FilePicker.')
              if updated != source:
                  path.write_text(updated)
                  changed.append(str(path))
          print('Migrated FilePicker API in:', ', '.join(changed) or 'none')
          PY
      - name: Resolve dependencies
        run: flutter pub get
      - name: Format source
        run: dart format lib
      - name: Analyze source
        run: flutter analyze --no-fatal-warnings --no-fatal-infos
      - name: Commit migration
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add pubspec.lock lib
          if git diff --cached --quiet; then
            echo "No generated changes to commit"
          else
            git commit -m "Migrate to FilePicker 11 API"
            git push
          fi
