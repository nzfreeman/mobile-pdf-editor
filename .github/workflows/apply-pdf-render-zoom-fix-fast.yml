name: Apply PDF render and zoom fix fast

on:
  push:
    paths:
      - '.github/workflows/apply-pdf-render-zoom-fix-fast.yml'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Patch source
        run: |
          python3 - <<'PY'
          from pathlib import Path

          service = Path('lib/services/pdf_service.dart')
          text = service.read_text()
          old = '''        final rendered = await page.render(
          width: targetWidth,
          height: targetHeight,
          backgroundColor: 0xFFFFFFFF,
        );'''
          new = '''        final rendered = await page.render(
          width: targetWidth,
          height: targetHeight,
          fullWidth: targetWidth.toDouble(),
          fullHeight: targetHeight.toDouble(),
          backgroundColor: 0xFFFFFFFF,
        );'''
          if old in text:
              service.write_text(text.replace(old, new))
          elif 'fullWidth: targetWidth.toDouble()' not in text:
              raise SystemExit('PdfPage.render block not found')

          editor = Path('lib/screens/pdf_editor_screen.dart')
          text = editor.read_text()
          old = '''                      onPanStart: (details) => _startStroke(details, pageSize),
                      onPanUpdate: (details) =>
                          _updateStroke(details, pageSize),
                      onPanEnd: _endStroke,'''
          new = '''                      onPanStart: _drawingMode
                          ? (details) => _startStroke(details, pageSize)
                          : null,
                      onPanUpdate: _drawingMode
                          ? (details) => _updateStroke(details, pageSize)
                          : null,
                      onPanEnd: _drawingMode ? _endStroke : null,'''
          if old in text:
              editor.write_text(text.replace(old, new))
          elif 'onPanStart: _drawingMode' not in text:
              raise SystemExit('Drawing gesture block not found')
          PY
      - name: Commit source fix
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add lib/services/pdf_service.dart lib/screens/pdf_editor_screen.dart
          git diff --cached --quiet || git commit -m "Fix PDF rendering scale and pinch zoom gestures"
          git push
