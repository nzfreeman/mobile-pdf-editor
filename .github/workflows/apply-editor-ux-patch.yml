name: Apply Editor UX Patch

on:
  push:
    branches: [main]
    paths:
      - tool/apply_editor_ux_patch.py
      - .github/workflows/apply-editor-ux-patch.yml

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Apply editor UX improvements
        run: python3 tool/apply_editor_ux_patch.py
      - name: Commit patched editor
        run: |
          if git diff --quiet; then
            echo "No changes required"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add lib/screens/pdf_editor_screen.dart
          git commit -m "Improve PDF fit, zoom and object controls"
          git push
