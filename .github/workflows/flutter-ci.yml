name: Flutter CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: flutter-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Apply pending PDF rendering and gesture fix
        if: github.event_name == 'pull_request' && github.head_ref == 'fix/pdf-render-pinch-zoom'
        run: |
          python3 - <<'PY'
          from pathlib import Path

          changed = False

          service = Path('lib/services/pdf_service.dart')
          text = service.read_text()
          old = '''        final rendered = await page.render(
          width: targetWidth,
          height: targetHeight,
          backgroundColor: 0xFFFFFFFF,
        );'''
          new = '''        final rendered = await page.render(
          width: targetWidth,
          height: targetHeight,
          fullWidth: targetWidth.toDouble(),
          fullHeight: targetHeight.toDouble(),
          backgroundColor: 0xFFFFFFFF,
        );'''
          if old in text:
              service.write_text(text.replace(old, new))
              changed = True

          editor = Path('lib/screens/pdf_editor_screen.dart')
          text = editor.read_text()
          old = '''                      onPanStart: (details) => _startStroke(details, pageSize),
                      onPanUpdate: (details) =>
                          _updateStroke(details, pageSize),
                      onPanEnd: _endStroke,'''
          new = '''                      onPanStart: _drawingMode
                          ? (details) => _startStroke(details, pageSize)
                          : null,
                      onPanUpdate: _drawingMode
                          ? (details) => _updateStroke(details, pageSize)
                          : null,
                      onPanEnd: _drawingMode ? _endStroke : null,'''
          if old in text:
              editor.write_text(text.replace(old, new))
              changed = True

          Path('/tmp/pdf_fix_changed').write_text('1' if changed else '0')
          PY
          if [ "$(cat /tmp/pdf_fix_changed)" = "1" ]; then
            dart format lib/services/pdf_service.dart lib/screens/pdf_editor_screen.dart
            git config user.name github-actions[bot]
            git config user.email 41898282+github-actions[bot]@users.noreply.github.com
            git add lib/services/pdf_service.dart lib/screens/pdf_editor_screen.dart
            git commit -m "Fix PDF rendering scale and pinch zoom gestures"
            git push origin HEAD:fix/pdf-render-pinch-zoom
          fi

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Show Flutter version
        run: flutter --version

      - name: Install dependencies
        run: flutter pub get

      - name: Check formatting
        run: dart format --output=none lib

      - name: Analyze source
        run: flutter analyze --no-fatal-warnings --no-fatal-infos

      - name: Run tests when present
        shell: bash
        run: |
          if [ -d test ] && find test -type f -name '*_test.dart' -print -quit | grep -q .; then
            flutter test
          else
            echo 'No Flutter tests found; skipping.'
          fi
