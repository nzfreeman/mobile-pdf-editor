name: Flutter CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: flutter-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Show Flutter version
        run: flutter --version

      - name: Install dependencies
        run: flutter pub get

      - name: Check formatting
        run: dart format --output=none --set-exit-if-changed lib test 2>/dev/null || dart format --output=none --set-exit-if-changed lib

      - name: Analyze source
        run: flutter analyze

      - name: Run tests when present
        shell: bash
        run: |
          if [ -d test ] && find test -type f -name '*_test.dart' -print -quit | grep -q .; then
            flutter test
          else
            echo 'No Flutter tests found; skipping.'
          fi
