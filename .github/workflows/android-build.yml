name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'lib/**'
      - 'pubspec.yaml'
      - '.github/workflows/android-build.yml'

permissions:
  contents: read

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Show Flutter environment
        run: flutter doctor -v

      - name: Generate Android project files
        run: flutter create . --platforms=android --org com.nzqueenbee --project-name mobile_pdf_editor

      - name: Configure Android project
        run: |
          python3 - <<'PY'
          from pathlib import Path

          manifest = Path('android/app/src/main/AndroidManifest.xml')
          text = manifest.read_text(encoding='utf-8')
          permissions = (
              '    <uses-permission android:name="android.permission.INTERNET" />\n'
              '    <uses-permission android:name="android.permission.CAMERA" />\n'
          )
          marker = '<manifest xmlns:android="http://schemas.android.com/apk/res/android">'
          if 'android.permission.INTERNET' not in text:
              text = text.replace(marker, marker + '\n' + permissions, 1)
          manifest.write_text(text, encoding='utf-8')

          gradle = Path('android/app/build.gradle.kts')
          gradle_text = gradle.read_text(encoding='utf-8')
          gradle_text = gradle_text.replace(
              'minSdk = flutter.minSdkVersion',
              'minSdk = 24',
          )
          gradle.write_text(gradle_text, encoding='utf-8')
          PY

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze app source
        run: flutter analyze lib --no-fatal-warnings --no-fatal-infos

      - name: Build release APK
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v7
        with:
          name: mobile-pdf-editor-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
          retention-days: 14
