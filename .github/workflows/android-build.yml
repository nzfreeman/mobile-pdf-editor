name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'lib/**'
      - 'pubspec.yaml'
      - '.github/workflows/android-build.yml'

permissions:
  contents: read

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Show Flutter environment
        run: flutter doctor -v

      - name: Generate Android project files
        run: flutter create . --platforms=android --org com.nzqueenbee --project-name mobile_pdf_editor

      - name: Add Android permissions
        run: |
          python3 - <<'PY'
          from pathlib import Path

          manifest = Path('android/app/src/main/AndroidManifest.xml')
          text = manifest.read_text(encoding='utf-8')
          permissions = (
              '    <uses-permission android:name="android.permission.INTERNET" />\n'
              '    <uses-permission android:name="android.permission.CAMERA" />\n'
          )
          if 'android.permission.INTERNET' not in text:
              text = text.replace(
                  '<manifest xmlns:android="http://schemas.android.com/apk/res/android">',
                  '<manifest xmlns:android="http://schemas.android.com/apk/res/android">\n' + permissions,
                  1,
              )
          manifest.write_text(text, encoding='utf-8')
          PY

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze source
        run: flutter analyze

      - name: Build release APK
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v7
        with:
          name: mobile-pdf-editor-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
          retention-days: 14

