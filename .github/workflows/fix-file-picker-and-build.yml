name: Fix FilePicker API and Build APK

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/fix-file-picker-and-build.yml'
      - 'pubspec.yaml'
      - 'lib/screens/**.dart'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}


      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Resolve dependencies
        run: flutter pub get

      - name: Generate Android project
        run: flutter create --platforms=android .

      - name: Remove stale plugin registry
        run: rm -f android/app/src/main/java/io/flutter/plugins/GeneratedPluginRegistrant.java

      - name: Check formatting
        run: dart format --output=none lib

      - name: Analyze source
        run: flutter analyze lib --no-fatal-warnings --no-fatal-infos

      - name: Clean Flutter project and caches
        run: |
          flutter clean
          rm -rf ~/.gradle/caches
          rm -rf android/.gradle
          rm -rf build/
          rm -f .flutter-plugins
          rm -f .flutter-plugins-dependencies
          rm -f .packages
          rm -rf .dart_tool/

      - name: Repair pub cache
        run: flutter pub cache repair

      - name: Re-resolve dependencies
        run: flutter pub get

      - name: Regenerate Android project
        run: flutter create --platforms=android .

      - name: Build release APK
        run: |
          # Run build with a post-generation hook to patch plugin registry
          # First build attempt will generate GeneratedPluginRegistrant.java
          flutter build apk --release 2>&1 | tee build.log || {
            # If it fails with FilePickerPlugin error, patch and retry
            PLUGIN_FILE="android/app/src/main/java/io/flutter/plugins/GeneratedPluginRegistrant.java"
            if grep -q "com.mr.flutter.plugin.filepicker.FilePickerPlugin" build.log 2>/dev/null; then
              echo "Patching FilePickerPlugin reference..."
              # Remove the problematic line
              sed -i '/com\.mr\.flutter\.plugin\.filepicker\.FilePickerPlugin/d' "$PLUGIN_FILE"
              # Clean and retry build
              rm -rf build/
              flutter build apk --release
            else
              exit 1
            fi
          }

      - name: Rename APK
        run: cp build/app/outputs/flutter-apk/app-release.apk mobile-pdf-editor-0.4.3+9.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: mobile-pdf-editor-0.4.3+9
          path: mobile-pdf-editor-0.4.3+9.apk
          if-no-files-found: error
          retention-days: 30
