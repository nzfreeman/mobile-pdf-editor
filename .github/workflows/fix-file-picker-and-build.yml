name: Fix FilePicker API and Build APK

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/fix-file-picker-and-build.yml'
      - 'pubspec.yaml'
      - 'lib/screens/**.dart'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Replace deprecated FilePicker instance API
        run: |
          python3 - <<'PY'
          from pathlib import Path
          changed = []
          for path in Path('lib').rglob('*.dart'):
              text = path.read_text()
              updated = text.replace('FilePicker.platform.pickFiles(', 'FilePicker.pickFiles(')
              updated = updated.replace('FilePicker.platform.saveFile(', 'FilePicker.saveFile(')
              if updated != text:
                  path.write_text(updated)
                  changed.append(str(path))
          print('Changed:', changed)
          PY

      - name: Commit source migration
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add lib
          if ! git diff --cached --quiet; then
            git commit -m "Migrate all FilePicker calls to static API"
            git push
          fi

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Generate Android project files
        run: flutter create --platforms=android .

      - name: Resolve dependencies
        run: flutter pub get

      - name: Check formatting
        run: dart format --output=none lib

      - name: Analyze source
        run: flutter analyze lib --no-fatal-warnings --no-fatal-infos

      - name: Build release APK
        run: flutter build apk --release

      - name: Rename APK
        run: cp build/app/outputs/flutter-apk/app-release.apk mobile-pdf-editor-0.4.3+9.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: mobile-pdf-editor-0.4.3+9
          path: mobile-pdf-editor-0.4.3+9.apk
          if-no-files-found: error
          retention-days: 30
