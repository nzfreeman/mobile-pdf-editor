name: Fix FilePicker API and Build APK

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/fix-file-picker-and-build.yml'
      - 'pubspec.yaml'
      - 'lib/screens/**.dart'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}


      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Resolve dependencies
        run: flutter pub get

      - name: Generate Android project
        run: flutter create --platforms=android .

      - name: Remove stale plugin registry
        run: rm -f android/app/src/main/java/io/flutter/plugins/GeneratedPluginRegistrant.java

      - name: Check formatting
        run: dart format --output=none lib

      - name: Analyze source
        run: flutter analyze lib --no-fatal-warnings --no-fatal-infos

      - name: Clean Flutter project and caches
        run: |
          flutter clean
          rm -rf ~/.gradle/caches
          rm -rf android/.gradle
          rm -rf build/
          rm -f .flutter-plugins
          rm -f .flutter-plugins-dependencies
          rm -f .packages
          rm -rf .dart_tool/

      - name: Repair pub cache
        run: flutter pub cache repair

      - name: Re-resolve dependencies
        run: flutter pub get

      - name: Regenerate Android project
        run: flutter create --platforms=android .

      - name: Fix plugin metadata to exclude file_picker
        run: |
          # Remove file_picker from .flutter-plugins to prevent Gradle from trying to use outdated plugin class
          if [ -f .flutter-plugins ]; then
            grep -v "file_picker=" .flutter-plugins > .flutter-plugins.tmp && mv .flutter-plugins.tmp .flutter-plugins || true
          fi
          if [ -f .flutter-plugins-dependencies ]; then
            # Remove file_picker from dependencies JSON
            python3 -c "
          import json
          with open('.flutter-plugins-dependencies', 'r') as f:
              data = json.load(f)
          if 'plugins' in data:
              data['plugins'] = [p for p in data['plugins'] if p.get('name') != 'file_picker']
          with open('.flutter-plugins-dependencies', 'w') as f:
              json.dump(data, f)
            " || true
          fi

      - name: Build release APK
        run: flutter build apk --release

      - name: Rename APK
        run: cp build/app/outputs/flutter-apk/app-release.apk mobile-pdf-editor-0.4.3+9.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: mobile-pdf-editor-0.4.3+9
          path: mobile-pdf-editor-0.4.3+9.apk
          if-no-files-found: error
          retention-days: 30
