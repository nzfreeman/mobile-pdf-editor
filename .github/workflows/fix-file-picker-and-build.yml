name: Fix FilePicker API and Build APK

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/fix-file-picker-and-build.yml'
      - 'pubspec.yaml'
      - 'lib/screens/**.dart'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}


      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Clean previous build artifacts
        run: flutter clean

      - name: Resolve dependencies
        run: flutter pub get

      - name: Generate fresh Android project files
        run: flutter create --platforms=android .

      - name: Check formatting
        run: dart format --output=none lib

      - name: Analyze source
        run: flutter analyze lib --no-fatal-warnings --no-fatal-infos

      - name: Build release APK
        run: flutter build apk --release

      - name: Rename APK
        run: cp build/app/outputs/flutter-apk/app-release.apk mobile-pdf-editor-0.4.3+9.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: mobile-pdf-editor-0.4.3+9
          path: mobile-pdf-editor-0.4.3+9.apk
          if-no-files-found: error
          retention-days: 30
