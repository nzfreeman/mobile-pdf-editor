name: Build Corrected PDF Zoom APK

on:
  push:
    branches: [main]
    paths:
      - 'lib/**'
      - 'pubspec.yaml'
      - 'pubspec.lock'
      - '.github/workflows/build-corrected-pdf-zoom-apk.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: corrected-pdf-zoom-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Normalize FilePicker 10 API
        shell: bash
        run: |
          find lib -name '*.dart' -type f -print0 | xargs -0 sed -i \
            -e 's/FilePicker\.pickFiles/FilePicker.platform.pickFiles/g' \
            -e 's/FilePicker\.saveFile/FilePicker.platform.saveFile/g' \
            -e 's/FilePicker\.getDirectoryPath/FilePicker.platform.getDirectoryPath/g'

      - name: Commit normalized source
        shell: bash
        run: |
          if ! git diff --quiet -- lib; then
            git config user.name github-actions[bot]
            git config user.email 41898282+github-actions[bot]@users.noreply.github.com
            git add lib
            git commit -m 'Normalize FilePicker API for 10.3.4'
            git push
          fi

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Show Flutter environment
        run: flutter --version

      - name: Clean generated state
        shell: bash
        run: |
          rm -rf android .dart_tool build
          rm -f pubspec.lock .flutter-plugins .flutter-plugins-dependencies

      - name: Resolve dependencies
        run: flutter pub get

      - name: Generate fresh Android project
        run: flutter create --platforms=android .

      - name: Resolve generated project dependencies
        run: flutter pub get

      - name: Check formatting
        run: dart format --output=none lib

      - name: Analyze source
        run: flutter analyze lib --no-fatal-warnings --no-fatal-infos

      - name: Build release APK
        run: flutter build apk --release

      - name: Rename APK
        run: cp build/app/outputs/flutter-apk/app-release.apk mobile-pdf-editor-0.4.3+9.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: mobile-pdf-editor-0.4.3+9
          path: mobile-pdf-editor-0.4.3+9.apk
          if-no-files-found: error
          retention-days: 30
